        run: |
          apk --no-cache add e2fsprogs-extra cmake g++ gcc git make pkgconfig python3 boost-dev zeromq-dev qt6-qtbase-dev qt6-qttools-dev ccache libqrencode-dev capnproto-dev

      - name: Generate buildsystem
        run: |
          cmake -B bld \
            --preset=dev-mode \
