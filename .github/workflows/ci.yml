        run: |
          zypper --non-interactive install -t pattern devel_basis
          zypper --non-interactive install e2fsprogs git pkg-config cmake python3 libboost_headers-devel gcc-c++ ccache zeromq-devel qt6-base-devel qt6-tools-devel qt6-linguist-devel qrencode-devel sqlite3-devel libcapnp-devel capnproto

      - name: Generate buildsystem
        run: |
          cmake -B bld \
            --preset=dev-mode \
            -DWITH_USDT=OFF \
            -DCMAKE_COMPILE_WARNING_AS_ERROR=ON \
